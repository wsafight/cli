name: CLI installer e2e

# 真实安装 codex 验证三大不变量（INV-INST-01/02/03）。
# 手动触发 + nightly 每日跑一次。
on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CLI deps
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Smoke test built bundle
        run: bun dist/index.js --version

      - name: Prepare TAKO_HOME with system bun
        shell: bash
        env:
          TAKO_HOME: ${{ runner.temp }}/tako-e2e
        run: |
          mkdir -p "$TAKO_HOME/bun/bin"
          BUN_PATH="$(which bun)"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "$BUN_PATH" "$TAKO_HOME/bun/bin/bun.exe"
          else
            ln -sf "$BUN_PATH" "$TAKO_HOME/bun/bin/bun"
          fi

      - name: Run installer e2e
        env:
          TAKO_HOME: ${{ runner.temp }}/tako-e2e
        run: bun tests/e2e/installer-driver.ts
