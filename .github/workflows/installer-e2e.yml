name: CLI installer e2e

# 真实安装 codex 验证三大不变量（INV-INST-01/02/03）。
# 手动触发 + nightly 每日跑一次。
on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Installer e2e
        uses: ./.github/actions/installer-e2e
