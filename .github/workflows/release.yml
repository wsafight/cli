name: CLI release

# 打 tag 触发：git tag v0.x.y && git push --tags
# 流程：e2e 三平台全过 → build → npm publish
on:
  push:
    tags:
      - "v*"

jobs:
  # ─── 阶段 1：三平台 e2e gate ───
  e2e:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Installer e2e
        uses: ./.github/actions/installer-e2e

  # ─── 阶段 2：build + publish（e2e 全过后）───
  publish:
    needs: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm (OIDC trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Smoke test built bundle
        run: |
          OUTPUT=$(bun dist/index.js --version)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Tako CLI" || (echo "FAIL: bundle cannot start" && exit 1)

      - name: Unit tests
        run: bun run test:unit

      - name: Pre-release checks
        run: bun run test:pre-release

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --provenance --access public
